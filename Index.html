<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione CVS</title>
<style>
:root {
  --primary: #1565c0;
  --primary-dark: #0d47a1;
  --primary-light: #42a5f5;
  --accent: #00897b;
  --accent-light: #26a69a;
  --danger: #c62828;
  --danger-light: #ef5350;
  --warning: #f9a825;
  --success: #2e7d32;
  --bg: #f0f2f5;
  --card: #ffffff;
  --text: #212529;
  --text-secondary: #5f6368;
  --border: #dadce0;
  --shadow: 0 1px 3px rgba(60,64,67,0.15);
  --shadow-lg: 0 4px 12px rgba(60,64,67,0.2);
  --radius: 8px;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
#login-screen {
  display:flex; align-items:center; justify-content:center;
  height:100vh;
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
}
.login-box {
  background: var(--card);
  padding: 40px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.login-box h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 6px; font-weight: 700; }
.login-box .subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 28px; text-transform: uppercase; letter-spacing: 1px; }
.login-box .logo-icon { font-size: 3rem; margin-bottom: 10px; }
.form-group { margin-bottom: 18px; text-align: left; }
.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input[type="text"], input[type="password"], input[type="email"],
input[type="date"], input[type="number"], input[type="time"],
select, textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fff;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
}
textarea { resize: vertical; min-height: 80px; }
.btn {
  display: inline-flex; align-items:center; justify-content:center;
  gap: 8px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--accent); color: #fff; }
.btn-success:hover { background: #00796b; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b71c1c; }
.btn-secondary { background: #e8eaed; color: var(--text); }
.btn-secondary:hover { background: #dadce0; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-block { width: 100%; }
.login-btn { padding: 12px; font-size: 1rem; margin-top: 8px; }

#app { display: none; height: 100vh; }
.sidebar {
  position: fixed;
  left: 0; top: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: #1a237e;
  color: #fff;
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}
.sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-header h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.sidebar-header .version { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }
.user-card { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.82rem; }
.user-card .role-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  margin-top: 4px;
}
.role-admin { background: var(--danger-light); color: #fff; }
.role-manager { background: var(--warning); color: #333; }
.role-viewer { background: var(--primary-light); color: #fff; }
.nav-menu { flex: 1; padding: 10px 0; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.2s;
  font-size: 0.88rem;
  font-weight: 500;
  border-left: 3px solid transparent;
  color: rgba(255,255,255,0.85);
  text-decoration: none;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.12); border-left-color: var(--accent-light); color: #fff; }
.nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }
.sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.sidebar-footer .btn { width: 100%; background: rgba(255,255,255,0.1); color: #fff; }
.sidebar-footer .btn:hover { background: rgba(255,255,255,0.2); }
.main-content { margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto; padding: 24px 28px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
.page-header .actions { display: flex; gap: 10px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; border-left: 4px solid var(--primary); transition: transform 0.2s, box-shadow 0.2s; }
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.kpi-card .kpi-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.kpi-card .kpi-value { font-size: 1.8rem; font-weight: 800; color: var(--text); margin-top: 6px; }
.kpi-card.kpi-danger { border-left-color: var(--danger); }
.kpi-card.kpi-success { border-left-color: var(--success); }
.kpi-card.kpi-warning { border-left-color: var(--warning); }
.kpi-card.kpi-accent { border-left-color: var(--accent); }

.chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 900px) { .chart-container { grid-template-columns: 1fr; } }

.css-chart .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.css-chart .bar-label { width: 120px; font-size: 0.8rem; color: var(--text-secondary); text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.css-chart .bar-track { flex: 1; height: 24px; background: #e8eaed; border-radius: 4px; overflow: hidden; }
.css-chart .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-right: 8px; justify-content: flex-end; color: #fff; font-size: 0.75rem; font-weight: 600; }
.css-chart .bar-fill.blue { background: var(--primary); }
.css-chart .bar-fill.teal { background: var(--accent); }
.css-chart .bar-fill.red { background: var(--danger-light); }
.css-chart .bar-fill.orange { background: #ef6c00; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table thead th {
  text-align: left;
  padding: 12px 14px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.data-table tbody td { padding: 12px 14px; font-size: 0.88rem; border-bottom: 1px solid var(--border); vertical-align: top; }
.data-table tbody tr:hover { background: #f8f9fa; }
.data-table tbody tr.clickable { cursor: pointer; }
.data-table tbody tr.clickable:hover { background: #e3f2fd; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
.badge-aperta { background: #fff3cd; color: #856404; }
.badge-chiusa { background: #d4edda; color: #155724; }
.badge-incorso { background: #cce5ff; color: #004085; }
.badge-grave { background: #f8d7da; color: #721c24; }
.badge-lieve { background: #d1ecf1; color: #0c5460; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.form-grid .form-group.full { grid-column: 1 / -1; }
.form-section { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.form-section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
.tab { padding: 10px 18px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal-box { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 24px; }
.modal-box.wide { max-width: 960px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h2 { font-size: 1.15rem; }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
.modal-close:hover { background: #f0f0f0; }

.search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input, .search-bar select { flex: 1; min-width: 180px; }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.detail-item .label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
.detail-item .value { font-size: 0.92rem; font-weight: 600; color: var(--text); }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 22px; border-radius: var(--radius); color: #fff; font-weight: 600; font-size: 0.88rem; z-index: 300; transform: translateY(100px); opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

.ps-header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; padding: 20px 24px; border-radius: var(--radius); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.ps-header h2 { font-size: 1.3rem; font-weight: 700; }
.ps-header .ps-meta { font-size: 0.82rem; opacity: 0.85; }
.ps-header .btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
.ps-header .btn:hover { background: rgba(255,255,255,0.25); }
.ps-tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.ps-tab { flex: 1; padding: 14px 18px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-align: center; border-bottom: 3px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: 1px solid var(--border); }
.ps-tab:last-child { border-right: none; }
.ps-tab:hover { color: var(--primary); background: #f8f9fa; }
.ps-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff; }
.ps-panel { display: none; }
.ps-panel.active { display: block; }
.ps-selettore { max-width: 600px; margin: 40px auto; text-align: center; }
.ps-selettore h2 { margin-bottom: 20px; color: var(--primary); }
.ps-str-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-top: 20px; }
.ps-str-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; text-align: left; }
.ps-str-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary-light); }
.ps-str-card .str-nome { font-weight: 700; font-size: 1rem; margin-bottom: 6px; color: var(--text); }
.ps-str-card .str-meta { font-size: 0.8rem; color: var(--text-secondary); }
.ps-str-card .str-icon { font-size: 2rem; margin-bottom: 10px; }

@media print { .sidebar, .page-header .actions, .btn { display: none !important; } .main-content { margin-left: 0; } }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #bdbdbd; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9e9e9e; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.aperta { background: var(--warning); }
.status-dot.chiusa { background: var(--success); }
.status-dot.incorso { background: var(--primary); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo-icon">&#x2695;&#xFE0F;</div>
    <h1>Gestione CVS</h1>
    <div class="subtitle">Clinical Risk Management</div>
    <div id="login-error" style="color:var(--danger);font-size:0.85rem;margin-bottom:14px;display:none;"></div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" required autocomplete="username" placeholder="Inserisci username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pw" required autocomplete="current-password" placeholder="Inserisci password">
      </div>
      <button type="submit" class="btn btn-primary btn-block login-btn" id="login-btn">
        <span>Accedi</span>
      </button>
    </form>
    <div style="margin-top:18px;font-size:0.78rem;color:var(--text-secondary);">
      Inserisci le credenziali fornite dall'amministratore
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ APP -->
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><span style="font-size:1.3rem;">&#x2695;&#xFE0F;</span> Gestione CVS</h2>
      <div class="version">v2.0 &mdash; Clinical Risk</div>
    </div>
    <div class="user-card">
      <div style="font-weight:700;" id="user-name">-</div>
      <div style="opacity:0.7;font-size:0.75rem;" id="user-struttura">-</div>
      <span class="role-badge" id="user-role">-</span>
    </div>
    <div class="nav-menu" id="nav-menu">
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">&#x1F4CA;</span> Dashboard
      </a>
      <a class="nav-item" data-page="strutture" onclick="navigate('strutture')">
        <span class="nav-icon">&#x1F3E5;</span> Strutture
      </a>
      <a class="nav-item" data-page="pratiche" onclick="navigate('pratiche')">
        <span class="nav-icon">&#x1F4CB;</span> Pratiche
      </a>
      <a class="nav-item" data-page="cvs" onclick="navigate('cvs')">
        <span class="nav-icon">&#x1F465;</span> CVS Professionisti
      </a>
      <a class="nav-item" data-page="agenda" onclick="navigate('agenda')">
        <span class="nav-icon">&#x1F4C5;</span> Agenda
      </a>
      <a class="nav-item" data-page="pannello" onclick="navigate('pannello')">
        <span class="nav-icon">&#x1F3E2;</span> Pannello Struttura
      </a>
      <a class="nav-item admin-only" data-page="utenti" onclick="navigate('utenti')" style="display:none;">
        <span class="nav-icon">&#x1F464;</span> Utenti
      </a>
      <a class="nav-item admin-only" data-page="audit" onclick="navigate('audit')" style="display:none;">
        <span class="nav-icon">&#x1F4DD;</span> Audit Log
      </a>
    </div>
    <div class="sidebar-footer">
      <button class="btn" onclick="logout()">
        <span>&#x1F6AA;</span> Disconnetti
      </button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <!-- Pages injected here -->
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Titolo</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   GESTIONE CVS - JAVASCRIPT FRONTEND CORRETTO
   ═══════════════════════════════════════════════════════════════ */

var STATE = {
  token: localStorage.getItem('cvs_token') || null,
  user: null,
  strutture: [],
  pratiche: [],
  cvs: [],
  agenda: [],
  utenti: [],
  audit: [],
  currentPage: 'dashboard',
  modalCallback: null
};

document.addEventListener('DOMContentLoaded', function() {
  if (STATE.token) {
    checkSessionAndLoad();
  }
});

function handleLogin(e) {
  e.preventDefault();
  var user = document.getElementById('login-user').value.trim();
  var pw = document.getElementById('login-pw').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');

  btn.innerHTML = '<span class="spinner"></span> Accesso...';
  btn.disabled = true;
  err.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.innerHTML = '<span>Accedi</span>';
      btn.disabled = false;
      if (res.success) {
        STATE.token = res.token;
        STATE.user = res.user;
        localStorage.setItem('cvs_token', res.token);
        showApp();
      } else {
        err.textContent = res.error || 'Errore di accesso';
        err.style.display = 'block';
      }
    })
    .withFailureHandler(function(e) {
      btn.innerHTML = '<span>Accedi</span>';
      btn.disabled = false;
      err.textContent = 'Errore di connessione: ' + e.message;
      err.style.display = 'block';
    })
    .login(user, pw);
}

function checkSessionAndLoad() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.valid) {
        STATE.user = res.user;
        showApp();
      } else {
        localStorage.removeItem('cvs_token');
        STATE.token = null;
      }
    })
    .withFailureHandler(function() {
      localStorage.removeItem('cvs_token');
      STATE.token = null;
    })
    .checkSession(STATE.token);
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = STATE.user.username;
  document.getElementById('user-struttura').textContent = STATE.user.strutturaNome || '-';
  var rb = document.getElementById('user-role');
  rb.textContent = STATE.user.ruolo;
  rb.className = 'role-badge role-' + STATE.user.ruolo;

  if (STATE.user.ruolo === 'admin') {
    document.querySelectorAll('.admin-only').forEach(function(el) { el.style.display = 'flex'; });
  }
  navigate('dashboard');
}

function logout() {
  if (STATE.token) {
    google.script.run.logout(STATE.token);
  }
  localStorage.removeItem('cvs_token');
  STATE.token = null;
  STATE.user = null;
  location.reload();
}

function navigate(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var active = document.querySelector('.nav-item[data-page="' + page + '"]');
  if (active) active.classList.add('active');

  var container = document.getElementById('main-content');
  container.innerHTML = '<div class="empty-state"><span class="spinner"></span><br>Caricamento...</div>';

  switch(page) {
    case 'dashboard': loadDashboard(); break;
    case 'strutture': loadStrutture(); break;
    case 'pratiche': loadPratiche(); break;
    case 'cvs': loadCVS(); break;
    case 'agenda': loadAgenda(); break;
    case 'pannello': loadPannelloStruttura(); break;
    case 'utenti': loadUtenti(); break;
    case 'audit': loadAudit(); break;
    default: loadDashboard();
  }
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function openModal(title, html, isWide) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-box').className = 'modal-box' + (isWide ? ' wide' : '');
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  if (STATE.modalCallback) { STATE.modalCallback(); STATE.modalCallback = null; }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '-';
  var d = new Date(s);
  if (isNaN(d)) return String(s).substring(0,10);
  return d.toLocaleDateString('it-IT');
}
function getStrutturaNome(id) {
  for (var i = 0; i < STATE.strutture.length; i++) {
    if (STATE.strutture[i].id === id) return STATE.strutture[i].nome;
  }
  return id || '-';
}
function struttureOptions(selected) {
  var h = '';
  for (var i = 0; i < STATE.strutture.length; i++) {
    var s = STATE.strutture[i];
    h += '<option value="' + escHtml(s.id) + '"' + (s.id === selected ? ' selected' : '') + '>' + escHtml(s.nome) + '</option>';
  }
  return h;
}

function loadDashboard() {
  google.script.run

function renderDashboard(kpi) {
  var container = document.getElementById('main-content');
  var strEntries = [];
  for (var k in kpi.perStruttura) {
    strEntries.push({ name: kpi.perStrutturaNomi[k] || k, value: kpi.perStruttura[k] });
  }
  strEntries.sort(function(a,b){ return b.value - a.value; });
  var maxStr = strEntries.length > 0 ? strEntries[0].value : 1;

  var html = '';
  html += '<div class="page-header"><h1>&#x1F4CA; Dashboard</h1><div class="actions"><button class="btn btn-secondary btn-sm" onclick="loadDashboard()">&#x1F504; Aggiorna</button></div></div>';

  html += '<div class="kpi-grid">';
  html += '<div class="kpi-card"><div class="kpi-label">Pratiche Totali</div><div class="kpi-value">' + kpi.totali + '</div></div>';
  html += '<div class="kpi-card kpi-warning"><div class="kpi-label">Aperte</div><div class="kpi-value">' + kpi.aperte + '</div></div>';
  html += '<div class="kpi-card kpi-success"><div class="kpi-label">Chiuse</div><div class="kpi-value">' + kpi.chiuse + '</div></div>';
  html += '<div class="kpi-card kpi-accent"><div class="kpi-label">In Corso</div><div class="kpi-value">' + kpi.inCorso + '</div></div>';
  html += '<div class="kpi-card kpi-danger"><div class="kpi-label">Eventi Gravi+</div><div class="kpi-value">' + kpi.gravi + '</div></div>';
  html += '</div>';

  html += '<div class="chart-container">';
  html += '<div class="card"><div class="card-title">&#x1F3E5; Pratiche per Struttura</div><div class="css-chart">';
  var colors = ['blue','teal','red','orange','blue','teal','red','orange'];
  for (var i = 0; i < Math.min(strEntries.length, 8); i++) {
    var pct = Math.round((strEntries[i].value / maxStr) * 100);
    html += '<div class="bar-row"><span class="bar-label" title="' + escHtml(strEntries[i].name) + '">' + escHtml(strEntries[i].name) + '</span>';
    html += '<div class="bar-track"><div class="bar-fill ' + colors[i] + '" style="width:' + pct + '%">' + strEntries[i].value + '</div></div></div>';
  }
  if (strEntries.length === 0) html += '<div class="empty-state">Nessun dato</div>';
  html += '</div></div>';

  html += '<div class="card"><div class="card-title">&#x26A0;&#xFE0F; Distribuzione per Gravit&agrave;</div><div class="css-chart">';
  var gravKeys = ['lieve','moderata','grave','gravissima'];
  var gravLabels = ['Lieve','Moderata','Grave','Gravissima'];
  var gravColors = ['blue','teal','orange','red'];
  var maxGrav = Math.max(kpi.perGravita.lieve, kpi.perGravita.moderata, kpi.perGravita.grave, kpi.perGravita.gravissima, 1);
  for (var g = 0; g < 4; g++) {
    var gv = kpi.perGravita[gravKeys[g]];
    var gpct = Math.round((gv / maxGrav) * 100);
    html += '<div class="bar-row"><span class="bar-label">' + gravLabels[g] + '</span>';
    html += '<div class="bar-track"><div class="bar-fill ' + gravColors[g] + '" style="width:' + gpct + '%">' + gv + '</div></div></div>';
  }
  html += '</div></div>';
  html += '</div>';

  html += '<div class="card"><div class="card-title">&#x1F4E2; Attivit&agrave; Recente</div>';
  html += '<div style="font-size:0.85rem;color:var(--text-secondary);">Usa il menu laterale per navigare tra le sezioni.</div>';
  html += '</div>';

  container.innerHTML = html;
}

  e.preventDefault();

    id: document.getElementById('str-id').value,
    nome: document.getElementById('str-nome').value,

    via: document.getElementById('str-via').value,

    provincia: document.getElementById('str-prov').value,
    cap: document.getElementById('str-cap').value,

    email: document.getElementById('str-email').value,
    direttore: document.getElementById('str-dir').value,
    emailAccesso: document.getElementById('str-acc-email').value,
    passwordAccesso: document.getElementById('str-acc-pw').value
  };

      closeModal();

    })

function deleteStruttura(id) {
  if (!confirm('Eliminare questa struttura?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Struttura eliminata');
      loadStrutture();
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .eliminaStruttura(STATE.token, id);
}

function loadPratiche() {

  html += '<select id="pra-filtro-esito" onchange="filterPratiche()"><option value="">Tutti gli esiti</option><option value="in_corso">In Corso</option><option value="chiusa">Chiusa</option><option value="archiviata">Archiviata</option></select>';

  }
  
  html += '</tbody></table></div></div>';

  container.innerHTML = html;

function renderPraticheRows(rows) {
  if (!rows || !Array.isArray(rows) || rows.length === 0) {
    return '<tr><td colspan="9" class="empty-state">Nessuna pratica trovata</td></tr>';
  }
  var isAdmin = STATE.user.ruolo === 'admin';
  var h = '';
  for (var i = 0; i < rows.length; i++) {
    var p = rows[i];
    if (!p) continue;
    var gravClass = p.gravita === 'grave' || p.gravita === 'gravissima' ? 'badge-grave' : (p.gravita === 'lieve' ? 'badge-lieve' : 'badge-aperta');
    var esitoClass = p.esito === 'chiusa' ? 'badge-chiusa' : (p.esito === 'in_corso' ? 'badge-incorso' : 'badge-aperta');
    var dotClass = p.esito === 'chiusa' ? 'chiusa' : (p.esito === 'in_corso' ? 'incorso' : 'aperta');
    h += '<tr class="clickable" onclick="viewPratica(' + i + ')">';
    h += '<td><strong>' + escHtml(p.numero_protocollo) + '</strong></td>';
    h += '<td>' + escHtml(getStrutturaNome(p.strutturaId)) + '</td>';
    h += '<td>' + fmtDate(p.data_evento) + '</td>';
    h += '<td>' + escHtml(p.cognome_paziente) + ' ' + escHtml(p.nome_paziente) + '</td>';
    h += '<td>' + escHtml(p.reparto) + '</td>';
    h += '<td>' + escHtml(p.tipo_evento) + '</td>';
    h += '<td><span class="badge ' + gravClass + '">' + escHtml(p.gravita) + '</span></td>';
    h += '<td><span class="status-dot ' + dotClass + '"></span><span class="badge ' + esitoClass + '">' + escHtml(p.esito) + '</span></td>';
    if (isAdmin) {
      h += '<td><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();openPraticaForm(' + i + ')">&#x270F;&#xFE0F;</button> ';
      h += '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deletePratica(' + i + ')">&#x1F5D1;&#xFE0F;</button></td>';
    }
    h += '</tr>';
  }
  return h;
}

function filterPratiche() {
  if (!STATE.pratiche || !Array.isArray(STATE.pratiche) || STATE.pratiche.length === 0) {
    var el = document.getElementById('pratiche-tbody');
    if (el) el.innerHTML = '<tr><td colspan="9" class="empty-state">Nessuna pratica trovata</td></tr>';
    return;
  }
  var q = document.getElementById('pra-search').value.toLowerCase();
  var fs = document.getElementById('pra-filtro-str').value;
  var fe = document.getElementById('pra-filtro-esito').value;
  var filtered = STATE.pratiche.filter(function(p) {
    if (!p) return false;
    var matchQ = !q || (p.nome_paziente||'').toLowerCase().indexOf(q)!==-1 || (p.cognome_paziente||'').toLowerCase().indexOf(q)!==-1 || (p.numero_protocollo||'').toLowerCase().indexOf(q)!==-1 || (p.reparto||'').toLowerCase().indexOf(q)!==-1;
    var matchS = !fs || p.strutturaId === fs;
    var matchE = !fe || p.esito === fe;
    return matchQ && matchS && matchE;
  });
  var el = document.getElementById('pratiche-tbody');
  if (el) el.innerHTML = renderPraticheRows(filtered);
}

function savePratica(e) {
  e.preventDefault();
  var rowIdx = document.getElementById('pra-rowidx').value;
  var orig = null;
  if (rowIdx) {
    var arrIdx = parseInt(rowIdx) - 2;
    if (STATE.pratiche[arrIdx]) orig = STATE.pratiche[arrIdx];
  }
  var obj = {
    _rowIndex: rowIdx || '',
    strutturaId: document.getElementById('pra-struttura').value,
    numero_protocollo: document.getElementById('pra-protocollo').value,
    data_apertura: document.getElementById('pra-data-apertura').value,
    data_evento: document.getElementById('pra-data-evento').value,
    reparto: document.getElementById('pra-reparto').value,
    descrizione: document.getElementById('pra-descrizione').value,
    nome_paziente: document.getElementById('pra-pnome').value,
    cognome_paziente: document.getElementById('pra-pcognome').value,
    cf_paziente: document.getElementById('pra-pcf').value,
    tipo_evento: document.getElementById('pra-tipo').value,
    gravita: document.getElementById('pra-gravita').value,
    esito: document.getElementById('pra-esito').value,
    medico: document.getElementById('pra-medico').value,
    dataRichiesta: orig ? orig.dataRichiesta : '',
    tipoRichiesta: orig ? orig.tipoRichiesta : '',
    ammontare: document.getElementById('pra-ammontare').value,
    invalidita: document.getElementById('pra-invalidita').value,
    riserva: document.getElementById('pra-riserva').value,
    dataDelibera: document.getElementById('pra-data-delibera').value,
    legale: document.getElementById('pra-legale').value,
    studio: document.getElementById('pra-studio').value,
    emailLegale: document.getElementById('pra-email-legale').value,
    telefonoLegale: document.getElementById('pra-tel-legale').value,
    polizzaAssicurativa: document.getElementById('pra-polizza').value,
    impresaAssicuratrice: document.getElementById('pra-impresa').value,
    sir: document.getElementById('pra-sir').value,
    quotaSir: document.getElementById('pra-quota-sir').value,
    franchigia: document.getElementById('pra-franchigia').value,
    quotaFranchigia: document.getElementById('pra-quota-fran').value,
    valutato: document.getElementById('pra-valutato').value,
    tribunale: document.getElementById('pra-tribunale').value,
    numeroRuolo: document.getElementById('pra-ruolo').value,
    ctuInvalidita: document.getElementById('pra-ctu-inv').value,
    ctuInabilita: document.getElementById('pra-ctu-ina').value,
    propostaConciliativa: document.getElementById('pra-conciliativa').value,
    dataProposta: document.getElementById('pra-data-proposta').value,
    valoreOfferta: document.getElementById('pra-offerta').value,
    importoLiquidato: document.getElementById('pra-liquidato').value,
    dataLiquidazione: document.getElementById('pra-data-liq').value,
    esitoLegale: document.getElementById('pra-esito-legale').value,
    dataChiusura: document.getElementById('pra-data-chiusura').value,
    note: document.getElementById('pra-note').value
  };
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      closeModal();
      showToast('Pratica salvata');
      loadPratiche();
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .salvaPratica(STATE.token, obj);
}

function deletePratica(arrIdx) {
  var p = STATE.pratiche[arrIdx];
  if (!p) return;
  if (!confirm('Eliminare la pratica ' + p.numero_protocollo + '?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Pratica eliminata');
      loadPratiche();
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .eliminaPratica(STATE.token, arrIdx + 2);
}

function loadCVS() {
  google.script.run
    .withSuccessHandler(function(data) {
      STATE.cvs = data;
      google.script.run
        .withSuccessHandler(function(str) { STATE.strutture = str; renderCVS(); })
        .getStrutture(STATE.token);
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .getTeam(STATE.token, '');
}

function renderCVS() {
  var container = document.getElementById('main-content');
  var html = '<div class="page-header"><h1>&#x1F465; CVS Professionisti</h1></div>';
  html += '<div class="card">';
  html += '<div class="search-bar">';
  html += '<select id="cvs-filtro-str" onchange="filterCVS()"><option value="">Tutte le strutture</option>' + struttureOptions() + '</select>';
  html += '<button class="btn btn-primary" onclick="openCVSForm()">+ Assegna CVS</button>';
  html += '</div>';
  html += '<div id="cvs-container">';
  html += renderCVSCards(STATE.cvs);
  html += '</div></div>';
  container.innerHTML = html;
}

function renderCVSCards(list) {
  if (list.length === 0) return '<div class="empty-state"><div class="icon">&#x1F465;</div>Nessun CVS configurato</div>';
  var h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:16px;">';
  for (var i = 0; i < list.length; i++) {
    var t = list[i];
    h += '<div class="card" style="margin-bottom:0;">';
    h += '<div style="font-weight:700;font-size:1rem;margin-bottom:4px;">' + escHtml(getStrutturaNome(t.strutturaId)) + '</div>';
    h += '<div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:12px;">Delibera: ' + fmtDate(t.dataDelibera) + '</div>';
    h += '<table style="width:100%;font-size:0.82rem;">';
    if (t.riskManagerNome) h += '<tr><td style="color:var(--text-secondary);padding:3px 0;">Risk Manager</td><td style="font-weight:600;padding:3px 0;text-align:right;">' + escHtml(t.riskManagerNome) + '<br><span style="font-weight:400;font-size:0.75rem;">' + escHtml(t.riskManagerEmail) + '</span></td></tr>';
    if (t.medicoLegaleNome) h += '<tr><td style="color:var(--text-secondary);padding:3px 0;">Medico Legale</td><td style="font-weight:600;padding:3px 0;text-align:right;">' + escHtml(t.medicoLegaleNome) + '<br><span style="font-weight:400;font-size:0.75rem;">' + escHtml(t.medicoLegaleEmail) + '</span></td></tr>';
    if (t.lossAdjusterNome) h += '<tr><td style="color:var(--text-secondary);padding:3px 0;">Loss Adjuster</td><td style="font-weight:600;padding:3px 0;text-align:right;">' + escHtml(t.lossAdjusterNome) + '<br><span style="font-weight:400;font-size:0.75rem;">' + escHtml(t.lossAdjusterEmail) + '</span></td></tr>';
    if (t.avvocatoNome) h += '<tr><td style="color:var(--text-secondary);padding:3px 0;">Avvocato</td><td style="font-weight:600;padding:3px 0;text-align:right;">' + escHtml(t.avvocatoNome) + '<br><span style="font-weight:400;font-size:0.75rem;">' + escHtml(t.avvocatoEmail) + '</span></td></tr>';
    h += '</table>';
    h += '<div style="margin-top:12px;text-align:right;"><button class="btn btn-sm btn-secondary" onclick="openCVSForm(' + i + ')">&#x270F;&#xFE0F; Modifica</button></div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function filterCVS() {
  var fs = document.getElementById('cvs-filtro-str').value;
  var filtered = STATE.cvs.filter(function(t) { return !fs || t.strutturaId === fs; });
  document.getElementById('cvs-container').innerHTML = renderCVSCards(filtered);
}

    h += '<td>' + escHtml(a.ora) + '</td>';
    h += '<td><span class="badge badge-aperta">' + escHtml(a.tipo) + '</span></td>';

function filterAgenda() {
  var fs = document.getElementById('age-filtro-str').value;

// ═══════════════════════════════════════════════════════════════
var PS_STATE = {
  strutturaId: null,
  struttura: null,
  pratiche: [],
  cvs: null,
  agenda: [],
  activeTab: 'dati'
};

function openPannelloStrutturaId(id) {
  PS_STATE.strutturaId = id;
  PS_STATE.activeTab = 'dati';
  navigate('pannello');
}

function loadPannelloStruttura() {
  if (PS_STATE.strutturaId) {
    _psCaricaStruttura(PS_STATE.strutturaId);
    return;
  }
  if (STATE.user.strutturaId && STATE.user.strutturaId !== 'tutti') {
    PS_STATE.strutturaId = STATE.user.strutturaId;
    PS_STATE.activeTab = 'dati';
    _psCaricaStruttura(PS_STATE.strutturaId);
    return;
  }
  _psMostraSelettore();
}

function _psMostraSelettore() {
  var container = document.getElementById('main-content');
  google.script.run
    .withSuccessHandler(function(strutture) {
      STATE.strutture = strutture;
      var html = '<div class="ps-selettore">';
      html += '<h1>&#x1F3E2; Pannello Struttura</h1>';
      html += '<p style="color:var(--text-secondary);margin-bottom:24px;">Seleziona una struttura per gestire dati, sinistri, professionisti e calendario.</p>';
      html += '<div class="ps-str-grid">';
      for (var i = 0; i < strutture.length; i++) {
        var s = strutture[i];
        var icon = s.tipo === 'ospedale' ? '&#x1F3E5;' : (s.tipo === 'casa di cura' ? '&#x1FA7A;' : '&#x1F3E2;');
        html += '<div class="ps-str-card" onclick="openPannelloStrutturaId(\'' + escHtml(s.id) + '\')">';
        html += '<div class="str-icon">' + icon + '</div>';
        html += '<div class="str-nome">' + escHtml(s.nome) + '</div>';
        html += '<div class="str-meta">' + escHtml(s.tipo) + ' &middot; ' + escHtml(s.citta) + ' (' + escHtml(s.provincia) + ')</div>';
        html += '</div>';
      }
      html += '</div></div>';
      container.innerHTML = html;
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .getStrutture(STATE.token);
}

function _psCaricaStruttura(id) {
  var container = document.getElementById('main-content');
  container.innerHTML = '<div class="empty-state"><span class="spinner"></span><br>Caricamento pannello...</div>';

  google.script.run
    .withSuccessHandler(function(s) {
      if (!s) { showToast('Struttura non trovata', 'error'); _psMostraSelettore(); return; }
      PS_STATE.struttura = s;
      renderPannelloStruttura();
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .getStruttura(STATE.token, id);
}

function renderPannelloStruttura() {
  var s = PS_STATE.struttura;
  var container = document.getElementById('main-content');
  var isAdmin = STATE.user.ruolo === 'admin';

  var html = '';

  // Header struttura
  html += '<div class="ps-header">';
  html += '<div>';
  html += '<h2>' + escHtml(s.nome) + '</h2>';
  html += '<div class="ps-meta">' + escHtml(s.tipo) + ' &middot; ' + escHtml(s.via) + ', ' + escHtml(s.citta) + ' (' + escHtml(s.provincia) + ') &middot; Tel: ' + escHtml(s.telefono) + '</div>';
  html += '</div>';
  html += '<div style="display:flex;gap:10px;">';
  if (isAdmin) html += '<button class="btn" onclick="openStrutturaForm(\'' + escHtml(s.id) + '\')">&#x270F;&#xFE0F; Modifica Dati</button>';
  html += '<button class="btn" onclick="PS_STATE.strutturaId=null;loadPannelloStruttura();">&#x1F504; Cambia Struttura</button>';
  html += '</div>';
  html += '</div>';

  // Tab bar
  html += '<div class="ps-tabs">';
  html += '<button class="ps-tab ' + (PS_STATE.activeTab==='dati'?'active':'') + '" onclick="psSwitchTab(\'dati\')">&#x1F4C4; Dati Struttura</button>';
  html += '<button class="ps-tab ' + (PS_STATE.activeTab==='pratiche'?'active':'') + '" onclick="psSwitchTab(\'pratiche\')">&#x1F4CB; Sinistri <span id="ps-badge-sin" class="badge badge-incorso" style="margin-left:6px;display:none;">0</span></button>';
  html += '<button class="ps-tab ' + (PS_STATE.activeTab==='cvs'?'active':'') + '" onclick="psSwitchTab(\'cvs\')">&#x1F465; Professionisti</button>';
  html += '<button class="ps-tab ' + (PS_STATE.activeTab==='agenda'?'active':'') + '" onclick="psSwitchTab(\'agenda\')">&#x1F4C5; Calendario <span id="ps-badge-age" class="badge badge-aperta" style="margin-left:6px;display:none;">0</span></button>';
  html += '</div>';

  // Pannelli
  html += '<div id="ps-panel-dati" class="ps-panel ' + (PS_STATE.activeTab==='dati'?'active':'') + '"></div>';
  html += '<div id="ps-panel-pratiche" class="ps-panel ' + (PS_STATE.activeTab==='pratiche'?'active':'') + '"></div>';
  html += '<div id="ps-panel-cvs" class="ps-panel ' + (PS_STATE.activeTab==='cvs'?'active':'') + '"></div>';
  html += '<div id="ps-panel-agenda" class="ps-panel ' + (PS_STATE.activeTab==='agenda'?'active':'') + '"></div>';

  container.innerHTML = html;

  // Render tab attivo
  if (PS_STATE.activeTab === 'dati') renderPSTabDati(s);
  else if (PS_STATE.activeTab === 'pratiche') renderPSTabPratiche(s.id);
  else if (PS_STATE.activeTab === 'cvs') renderPSTabCVS(s.id);
  else if (PS_STATE.activeTab === 'agenda') renderPSTabAgenda(s.id);
}

function psSwitchTab(tab) {
  PS_STATE.activeTab = tab;
  document.querySelectorAll('.ps-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.ps-panel').forEach(function(p){ p.classList.remove('active'); });
  var tabEl = document.querySelector('.ps-tab:nth-child(' + (tab==='dati'?1:tab==='pratiche'?2:tab==='cvs'?3:4) + ')');
  if (tabEl) tabEl.classList.add('active');
  document.getElementById('ps-panel-' + (tab==='pratiche'?'pratiche':tab==='cvs'?'cvs':tab==='agenda'?'agenda':'dati')).classList.add('active');

  if (tab === 'dati') renderPSTabDati(PS_STATE.struttura);
  else if (tab === 'pratiche') renderPSTabPratiche(PS_STATE.struttura.id);
  else if (tab === 'cvs') renderPSTabCVS(PS_STATE.struttura.id);
  else if (tab === 'agenda') renderPSTabAgenda(PS_STATE.struttura.id);
}

function renderPSTabPratiche(strutturaId) {
  var panel = document.getElementById('ps-panel-pratiche');
  panel.innerHTML = '<div class="empty-state"><span class="spinner"></span><br>Caricamento sinistri...</div>';

    .withSuccessHandler(function(pratiche) {

        pratiche = [];
      }
      PS_STATE.pratiche = pratiche;
      var badge = document.getElementById('ps-badge-sin');
      if (badge) { badge.textContent = pratiche.length; badge.style.display = pratiche.length ? 'inline-block' : 'none'; }

      var html = '<div class="card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">';
      html += '<div class="card-title" style="margin-bottom:0;">&#x1F4CB; Sinistri della Struttura</div>';

function renderPSSinistriRows(pratiche) {
  if (!pratiche || pratiche.length === 0) {
    return '<tr><td colspan="8" class="empty-state">Nessun sinistro per questa struttura. Clicca "Nuovo Sinistro" per aggiungerne uno.</td></tr>';
  }
  var h = '';
  for (var i = 0; i < pratiche.length; i++) {
    var p = pratiche[i];
    if (!p) continue; 
    var gravClass = p.gravita === 'grave' || p.gravita === 'gravissima' ? 'badge-grave' : (p.gravita === 'lieve' ? 'badge-lieve' : 'badge-aperta');
    var esitoClass = p.esito === 'chiusa' ? 'badge-chiusa' : (p.esito === 'in_corso' ? 'badge-incorso' : 'badge-aperta');
    var dotClass = p.esito === 'chiusa' ? 'chiusa' : (p.esito === 'in_corso' ? 'incorso' : 'aperta');
    h += '<tr>';
    h += '<td><strong>' + escHtml(p.numero_protocollo) + '</strong></td>';
    h += '<td>' + fmtDate(p.data_evento) + '</td>';
    h += '<td>' + escHtml(p.cognome_paziente) + ' ' + escHtml(p.nome_paziente) + '</td>';
    h += '<td>' + escHtml(p.reparto) + '</td>';
    h += '<td>' + escHtml(p.tipo_evento) + '</td>';
    h += '<td><span class="badge ' + gravClass + '">' + escHtml(p.gravita) + '</span></td>';
    h += '<td><span class="status-dot ' + dotClass + '"></span><span class="badge ' + esitoClass + '">' + escHtml(p.esito) + '</span></td>';
    h += '<td><button class="btn btn-sm btn-secondary" onclick="openPSSinistroForm(' + i + ')">&#x270F;&#xFE0F;</button> ';
    h += '<button class="btn btn-sm btn-danger" onclick="deletePSSinistro(' + i + ')">&#x1F5D1;&#xFE0F;</button></td>';
    h += '</tr>';
  }
  return h;
}

  var obj = {
    _rowIndex: rowIdx || '',

    invalidita: document.getElementById('pspra-invalidita').value,

    dataDelibera: document.getElementById('pspra-data-delibera').value,
    legale: document.getElementById('pspra-legale').value,

      renderPSTabPratiche(PS_STATE.struttura.id);

function deletePSSinistro(arrIdx) {
  var p = PS_STATE.pratiche[arrIdx];
  if (!p) return;
  if (!confirm('Eliminare il sinistro ' + p.numero_protocollo + '?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Sinistro eliminato');
      renderPSTabPratiche(PS_STATE.struttura.id);
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .eliminaPratica(STATE.token, arrIdx + 2);
}

function savePSTeam(e) {
  e.preventDefault();
  var obj = {
    strutturaId: document.getElementById('psteam-struttura').value,
    dataDelibera: document.getElementById('psteam-delibera').value,
    riskManagerNome: document.getElementById('psteam-rm-nome').value,
    riskManagerEmail: document.getElementById('psteam-rm-email').value,
    riskManagerTel: document.getElementById('psteam-rm-tel').value,
    medicoLegaleNome: document.getElementById('psteam-ml-nome').value,
    medicoLegaleEmail: document.getElementById('psteam-ml-email').value,
    medicoLegaleTel: document.getElementById('psteam-ml-tel').value,
    lossAdjusterNome: document.getElementById('psteam-la-nome').value,
    lossAdjusterEmail: document.getElementById('psteam-la-email').value,
    lossAdjusterTel: document.getElementById('psteam-la-tel').value,
    avvocatoNome: document.getElementById('psteam-av-nome').value,
    avvocatoEmail: document.getElementById('psteam-av-email').value,
    avvocatoTel: document.getElementById('psteam-av-tel').value
  };
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      closeModal();
      showToast('CVS salvato');
      renderPSTabCVS(PS_STATE.struttura.id);
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .salvaTeam(STATE.token, obj);
}

// ── TAB CALENDARIO / AGENDA ──
function renderPSTabAgenda(strutturaId) {
  var panel = document.getElementById('ps-panel-agenda');
  panel.innerHTML = '<div class="empty-state"><span class="spinner"></span><br>Caricamento calendario...</div>';

  google.script.run
    .withSuccessHandler(function(eventi) {
      PS_STATE.agenda = eventi;
      var badge = document.getElementById('ps-badge-age');
      if (badge) { badge.textContent = eventi.length; badge.style.display = eventi.length ? 'inline-block' : 'none'; }

      var html = '<div class="card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">';
      html += '<div class="card-title" style="margin-bottom:0;">&#x1F4C5; Calendario Eventi</div>';
      html += '<button class="btn btn-primary" onclick="openPSAgendaForm()">+ Nuovo Evento</button>';
      html += '</div>';
      html += '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>';
      html += '<th>Data</th><th>Ora</th><th>Tipo</th><th>ODG</th><th>Partecipanti</th><th style="width:100px;">Azioni</th>';
      html += '</tr></thead><tbody>';
      html += renderPSAgendaRows(eventi);
      html += '</tbody></table></div></div>';
      panel.innerHTML = html;
    })
    .withFailureHandler(function(e) { panel.innerHTML = '<div class="empty-state">Errore: ' + escHtml(e.message) + '</div>'; })
    .getAgenda(STATE.token, strutturaId);
}

function renderPSAgendaRows(rows) {
  if (rows.length === 0) return '<tr><td colspan="6" class="empty-state">Nessun evento programmato. Clicca "Nuovo Evento" per aggiungerne uno.</td></tr>';
  var h = '';
  for (var i = 0; i < rows.length; i++) {
    var a = rows[i];
    h += '<tr>';
    h += '<td>' + fmtDate(a.data) + '</td>';
    h += '<td>' + escHtml(a.ora) + '</td>';
    h += '<td><span class="badge badge-aperta">' + escHtml(a.tipo) + '</span></td>';
    h += '<td>' + escHtml(a.odg) + '</td>';
    h += '<td>' + escHtml(a.partecipanti) + '</td>';
    h += '<td><button class="btn btn-sm btn-secondary" onclick="openPSAgendaForm(' + i + ')">&#x270F;&#xFE0F;</button> ';
    h += '<button class="btn btn-sm btn-danger" onclick="deletePSAgenda(\'' + escHtml(a.id) + '\')">&#x1F5D1;&#xFE0F;</button></td>';
    h += '</tr>';
  }
  return h;
}

function openPSAgendaForm(idx) {
  var a = (idx !== undefined && PS_STATE.agenda[idx]) ? PS_STATE.agenda[idx] : null;
  var html = '<form onsubmit="savePSAgenda(event)">';
  html += '<input type="hidden" id="psage-id" value="' + (a ? escHtml(a.id) : '') + '">';
  html += '<input type="hidden" id="psage-struttura" value="' + escHtml(PS_STATE.struttura.id) + '">';
  html += '<div class="form-grid">';
  html += '<div class="form-group"><label>Data *</label><input type="date" id="psage-data" required value="' + (a && a.data ? String(a.data).substring(0,10) : '') + '"></div>';
  html += '<div class="form-group"><label>Ora</label><input type="time" id="psage-ora" value="' + (a ? escHtml(a.ora) : '') + '"></div>';
  html += '<div class="form-group"><label>Tipo *</label><select id="psage-tipo" required><option value="">Seleziona...</option><option value="riunione"' + (a && a.tipo==='riunione'?' selected':'') + '>Riunione</option><option value="udienza"' + (a && a.tipo==='udienza'?' selected':'') + '>Udienza</option><option value="perizia"' + (a && a.tipo==='perizia'?' selected':'') + '>Perizia</option><option value="collegiale"' + (a && a.tipo==='collegiale'?' selected':'') + '>Collegiale</option><option value="altro"' + (a && a.tipo==='altro'?' selected':'') + '>Altro</option></select></div>';
  html += '<div class="form-group full"><label>Ordine del Giorno</label><textarea id="psage-odg">' + (a ? escHtml(a.odg) : '') + '</textarea></div>';
  html += '<div class="form-group full"><label>Partecipanti</label><textarea id="psage-part">' + (a ? escHtml(a.partecipanti) : '') + '</textarea></div>';
  html += '<div class="form-group full"><label>Note</label><textarea id="psage-note">' + (a ? escHtml(a.note) : '') + '</textarea></div>';
  html += '</div>';
  html += '<div style="margin-top:18px;display:flex;gap:10px;justify-content:flex-end;"><button type="button" class="btn btn-secondary" onclick="closeModal()">Annulla</button><button type="submit" class="btn btn-primary">Salva Evento</button></div>';
  html += '</form>';
  openModal(a ? 'Modifica Evento' : 'Nuovo Evento', html);
}

function savePSAgenda(e) {
  e.preventDefault();
  var obj = {
    id: document.getElementById('psage-id').value,
    data: document.getElementById('psage-data').value,
    ora: document.getElementById('psage-ora').value,
    tipo: document.getElementById('psage-tipo').value,
    strutturaId: document.getElementById('psage-struttura').value,
    odg: document.getElementById('psage-odg').value,
    partecipanti: document.getElementById('psage-part').value,
    note: document.getElementById('psage-note').value
  };
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      closeModal();
      showToast('Evento salvato');
      renderPSTabAgenda(PS_STATE.struttura.id);
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .salvaAgenda(STATE.token, obj);
}

function deletePSAgenda(id) {
  if (!confirm('Eliminare questo evento?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Evento eliminato');
      renderPSTabAgenda(PS_STATE.struttura.id);
    })
    .withFailureHandler(function(e) { showToast(e.message, 'error'); })
    .eliminaAgenda(STATE.token, id);
}
</script>
